<!DOCTYPE html>
<!--
  SAGNKORTET — Find og fang danske sagnvæsner
  Upload til GitHub Pages: se kommentar i bunden af filen
-->
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sagnkortet">
  <title>Sagnkortet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#1a0a05;font-family:'Cinzel',Georgia,serif;height:100dvh;overflow:hidden}
    .hidden{display:none!important}

    /* ── Kortramme ── */
    #frame{position:absolute;inset:8px;border:3px solid #6b3d1e;border-radius:3px;overflow:hidden;
      box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 0 25px rgba(0,0,0,.9)}
    #map{width:100%;height:100%}
    .ornament{position:absolute;width:48px;height:48px;z-index:10;pointer-events:none;opacity:.85}
    .ornament-tl{top:2px;left:2px}
    .ornament-tr{top:2px;right:2px;transform:scaleX(-1)}
    .ornament-bl{bottom:2px;left:2px;transform:scaleY(-1)}
    .ornament-br{bottom:2px;right:2px;transform:scale(-1,-1)}
    #title{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:10;
      background:rgba(240,225,178,.93);border:2px solid #6b3d1e;padding:4px 18px 3px;
      color:#2e1206;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
      white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.35)}
    #gps-btn{position:absolute;bottom:26px;right:14px;z-index:10;width:54px;height:54px;
      background:rgba(240,225,178,.96);border:3px solid #6b3d1e;border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:24px;
      box-shadow:0 3px 12px rgba(0,0,0,.45);transition:transform .12s;
      -webkit-tap-highlight-color:transparent;user-select:none}
    #gps-btn:active{transform:scale(.9)}
    #gps-btn.searching{animation:pulse 1.4s ease-in-out infinite}
    #bestiary-btn{position:absolute;bottom:26px;right:80px;z-index:10;width:54px;height:54px;
      background:rgba(240,225,178,.96);border:3px solid #6b3d1e;border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:22px;
      box-shadow:0 3px 12px rgba(0,0,0,.45);transition:transform .12s;
      -webkit-tap-highlight-color:transparent;user-select:none}
    #bestiary-btn:active{transform:scale(.9)}
    #status{position:absolute;bottom:90px;right:10px;z-index:10;background:rgba(240,225,178,.94);
      border:1px solid #6b3d1e;padding:5px 12px;color:#2e1206;font-size:10px;letter-spacing:.6px;
      max-width:190px;text-align:center;pointer-events:none;display:none}

    /* ── Nærhed-banner ── */
    #nearby-banner{position:absolute;bottom:96px;left:50%;transform:translateX(-50%);z-index:20;
      background:rgba(15,8,30,.92);border:2px solid var(--bc,#6b3d1e);border-radius:40px;
      padding:10px 18px;display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.6),0 0 20px var(--bs,rgba(107,61,30,.4));
      animation:slideUp .4s ease;white-space:nowrap;max-width:90vw}
    #nearby-banner .nb-icon{font-size:26px;filter:drop-shadow(0 0 6px var(--bc,#6b3d1e))}
    #nearby-banner .nb-text{color:#f2e6be;font-size:11px;letter-spacing:.5px;line-height:1.4}
    #nearby-banner .nb-name{font-weight:700;font-size:13px;color:var(--bc,#f2e6be)}
    #nearby-btn{background:var(--bc,#6b3d1e);color:#f2e6be;border:none;border-radius:20px;
      padding:7px 14px;font-family:'Cinzel',serif;font-size:11px;cursor:pointer;white-space:nowrap;
      -webkit-tap-highlight-color:transparent}

    /* ── Creature markers ── */
    .cm{width:44px;height:52px;cursor:pointer;filter:drop-shadow(0 0 8px var(--cc));
      animation:cfloat 3s ease-in-out infinite,cpulse 2s ease-in-out infinite}
    .cm:hover{filter:drop-shadow(0 0 14px var(--cc));transform:scale(1.1)}
    @keyframes cfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes cpulse{0%,100%{opacity:1}50%{opacity:.8}}

    /* ── Encounter overlay ── */
    #encounter-overlay{position:fixed;inset:0;background:rgba(3,1,10,.9);z-index:100;
      display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    #encounter-card{width:min(360px,92vw);background:linear-gradient(170deg,#12080a 0%,#060412 100%);
      border:2px solid #5a2a0e;border-radius:10px;padding:20px;text-align:center;
      position:relative;box-shadow:0 0 60px rgba(0,0,0,.9),inset 0 0 40px rgba(0,0,0,.5)}
    #ec-glow{position:absolute;inset:0;border-radius:10px;pointer-events:none;
      background:radial-gradient(ellipse at 50% 0%,var(--eg,rgba(107,61,30,.3)) 0%,transparent 70%)}
    #ec-art{width:130px;height:150px;margin:0 auto 8px}
    #ec-name{font-size:20px;font-weight:700;color:var(--en,#f2e6be);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
    #ec-lore{font-size:10px;color:#a08060;line-height:1.6;margin-bottom:14px;font-family:Georgia,serif;
      font-style:italic;min-height:40px}
    #ec-instruction{font-size:11px;color:#c9a227;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
    #sigil-wrap{position:relative;width:100%;padding-top:85%;margin-bottom:12px}
    #sigil-canvas{position:absolute;inset:0;width:100%;height:100%;
      border-radius:6px;touch-action:none;cursor:crosshair}
    #ec-result{font-size:14px;font-weight:700;letter-spacing:2px;min-height:22px;margin-bottom:10px}
    #flee-btn{background:transparent;border:1px solid #4a2a10;color:#6a4a30;border-radius:20px;
      padding:8px 24px;font-family:'Cinzel',serif;font-size:11px;cursor:pointer;
      -webkit-tap-highlight-color:transparent}
    #flee-btn:hover{border-color:#6b3d1e;color:#a06040}

    /* ── Bestiary ── */
    #bestiary-panel{position:fixed;inset:0;background:rgba(3,1,10,.95);z-index:100;
      display:flex;flex-direction:column;backdrop-filter:blur(4px)}
    #bp-header{display:flex;align-items:center;justify-content:space-between;
      padding:20px 20px 12px;border-bottom:1px solid #3a1a08}
    #bp-title{font-size:18px;font-weight:700;color:#f2e6be;letter-spacing:3px;text-transform:uppercase}
    #bp-count{font-size:11px;color:#8a6040;letter-spacing:1px}
    #bp-close{background:transparent;border:1px solid #4a2a10;color:#8a6040;
      border-radius:20px;padding:6px 16px;font-family:'Cinzel',serif;font-size:11px;cursor:pointer}
    #bp-scroll{flex:1;overflow-y:auto;padding:16px}
    #bp-empty{text-align:center;color:#4a2a10;font-size:12px;margin-top:60px;line-height:2;font-style:italic}
    .bp-section{margin-bottom:20px}
    .bp-section-title{font-size:10px;color:#6a4a20;letter-spacing:2px;text-transform:uppercase;
      margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #2a1206}
    .bp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .bp-amulet{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
    .bp-amulet-art{width:80px;height:80px;border-radius:50%;border:2px solid #6b3d1e;
      background:#0a0508;overflow:hidden;box-shadow:0 0 12px rgba(0,0,0,.5)}
    .bp-amulet-art canvas{width:100%;height:100%}
    .bp-amulet-name{font-size:9px;color:#a08060;letter-spacing:1px;text-align:center}
    .bp-amulet-count{font-size:8px;color:#4a2a10;font-style:italic}
    .bp-amulet.locked .bp-amulet-art{border-color:#2a1206;opacity:.4}
    .bp-amulet.locked .bp-amulet-name{color:#3a1a08}

    /* ── MapLibre controls ── */
    .maplibregl-ctrl-group{border:2px solid #6b3d1e!important;border-radius:0!important;overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,.3)!important}
    .maplibregl-ctrl-group button{background:rgba(240,225,178,.95)!important;border-color:#6b3d1e!important}
    .maplibregl-ctrl-group button span{filter:invert(20%) sepia(40%) saturate(600%) hue-rotate(340deg)}
    .maplibregl-ctrl-attrib{background:rgba(240,225,178,.82)!important;color:#6b3d1e!important;font-size:9px!important}
    .maplibregl-ctrl-attrib a{color:#6b3d1e!important}
    .maplibregl-ctrl-scale{background:rgba(240,225,178,.85)!important;border-color:#6b3d1e!important;
      color:#2e1206!important;font-family:'Cinzel',serif!important;font-size:9px!important}
    .maplibregl-popup-content{background:rgba(240,225,178,.97)!important;border:2px solid #6b3d1e!important;
      border-radius:4px!important;box-shadow:0 3px 12px rgba(0,0,0,.4)!important;padding:10px 14px!important}
    .maplibregl-popup-close-button{color:#6b3d1e!important;font-size:16px!important}
    .maplibregl-popup-tip{border-top-color:rgba(240,225,178,.97)!important}

    /* ── Animationer ── */
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(107,61,30,.65)}60%{box-shadow:0 0 0 14px rgba(107,61,30,0)}100%{box-shadow:0 0 0 0 rgba(107,61,30,0)}}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
    @keyframes bindSuccess{0%{transform:scale(1);filter:brightness(1)}40%{transform:scale(1.08);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    @keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,0)}50%{box-shadow:0 0 30px 10px rgba(201,162,39,.5)}}
  </style>
</head>
<body>

<!-- ── Kortramme ── -->
<div id="frame">

  </svg>

    <circle cx="4" cy="4" r="2.5" fill="#6b3d1e"/><circle cx="15" cy="4" r="1.5" fill="#6b3d1e"/><circle cx="4" cy="15" r="1.5" fill="#6b3d1e"/>

  </svg>

  <div id="title">&#x2E1C; Sagnkortet &#x2E1C;</div>
  <div id="map"></div>
  <div id="gps-btn" onclick="startTracking()" title="Find min position">&#x1F9ED;</div>
  <div id="bestiary-btn" onclick="openBestiary()" title="Bestiarium">&#x1F4D6;</div>
  <div id="status"></div>
</div>

<!-- ── Nærhed-banner ── -->
<div id="nearby-banner" class="hidden">
  <span class="nb-icon" id="nb-icon"></span>
  <div>
    <div class="nb-name" id="nb-name"></div>
    <div class="nb-text" id="nb-dist"></div>
  </div>
  <button class="nb-btn" id="nearby-btn" onclick="startEncounter()">Mød den!</button>
</div>

<!-- ── Encounter overlay ── -->
<div id="encounter-overlay" class="hidden">
  <div id="encounter-card">
    <div id="ec-glow"></div>
    <div id="ec-art"></div>
    <div id="ec-name"></div>
    <div id="ec-lore"></div>
    <div id="ec-instruction">Tegn besværgelsen for at binde den!</div>
    <div id="sigil-wrap">
      <canvas id="sigil-canvas"></canvas>
    </div>
    <div id="ec-result"></div>
    <button id="flee-btn" onclick="endEncounter(false)">Flygt</button>
  </div>
</div>

<!-- ── Bestiarium ── -->
<div id="bestiary-panel" class="hidden">
  <div id="bp-header">
    <div>
      <div id="bp-title">Bestiarium</div>
      <div id="bp-count"></div>
    </div>
    <button id="bp-close" onclick="closeBestiary()">Luk</button>
  </div>
  <div id="bp-scroll">
    <div id="bp-empty">Du har endnu ikke fanget nogen sagnvæsner.<br>Gå ud og udforsk verden!</div>
    <div id="bp-content" class="hidden"></div>
  </div>
</div>

const map = new maplibregl.Map({
  container:'map', style:kortStil, center:[9.5,56.26],
  zoom:7, pitch:45, bearing:-15, attributionControl:true
});
map.addControl(new maplibregl.NavigationControl({showCompass:true}),'top-left');
map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-left');

// ═══════════════════════════════════════════════════════════════
// SPILTILSTAND
// ═══════════════════════════════════════════════════════════════
let gs = loadState();   // game state
let spawned = [];       // { id, vaesen, lngLat, marker }
let nearbyTarget = null;
let activeVaesen = null;
let watchId = null;
let userPos = null;
let spawnTimer = null;

function loadState() {
  try { return JSON.parse(localStorage.getItem('sagnkortet') || 'null') || { caught:{} }; }
  catch { return { caught:{} }; }
}
function saveState() {
  localStorage.setItem('sagnkortet', JSON.stringify(gs));
}

// ═══════════════════════════════════════════════════════════════
// GPS & SPAWN
// ═══════════════════════════════════════════════════════════════
function startTracking() {
  if (!navigator.geolocation) { showStatus('GPS ikke tilgængeligt',4000); return; }
  const btn = document.getElementById('gps-btn');
  btn.classList.add('searching');
  showStatus('Søger position…',0);
  if (watchId) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(onPos, onPosErr,
    { enableHighAccuracy:true, timeout:20000, maximumAge:10000 });
}

function onPos(pos) {
  document.getElementById('gps-btn').classList.remove('searching');
  const { latitude:lat, longitude:lng, accuracy:acc } = pos.coords;
  const moved = !userPos || haversine(userPos[1],userPos[0],lat,lng) > 50;
  userPos = [lng,lat];

  if (moved) {
    map.flyTo({ center:[lng,lat], zoom:Math.max(map.getZoom(),15), pitch:50, duration:1200 });
    showStatus(`±${Math.round(acc)} m`);
    map.once('idle', () => spawnNearby(lng,lat));
  }
  checkProximity();
}

function onPosErr(err) {
  document.getElementById('gps-btn').classList.remove('searching');
  const msgs={1:'Tilladelse nægtet',2:'Position ikke fundet',3:'GPS-timeout'};
  showStatus(msgs[err.code]||'GPS-fejl',5000);
}

function spawnNearby(lng,lat) {
  // Fjern gamle spawns
  spawned.forEach(s => s.marker.remove());
  spawned = [];

  const pixel = map.project([lng,lat]);
  const r = 280;
  const bbox = [[pixel.x-r,pixel.y-r],[pixel.x+r,pixel.y+r]];

  const waterFeats   = map.queryRenderedFeatures(bbox, {layers:['water','waterway']});
  const forestFeats  = map.queryRenderedFeatures(bbox, {layers:['forest','forest2']});
  const buildFeats   = map.queryRenderedFeatures(bbox, {layers:['building']});

  const toSpawn = [];
  if (waterFeats.length)  toSpawn.push(...pickVaesner('water',  waterFeats,  2));
  if (forestFeats.length) toSpawn.push(...pickVaesner('forest', forestFeats, 2));
  if (buildFeats.length)  toSpawn.push(...pickVaesner('building',buildFeats, 2));

  // Tilføj mindst én tilfældig hvis ingen features
  if (!toSpawn.length) {
    const v = VAESNER[Math.floor(Math.random()*VAESNER.length)];
    toSpawn.push({ vaesen:v, lngLat:[lng + rnd(.003), lat + rnd(.003)] });
  }

  toSpawn.slice(0,5).forEach(({vaesen,lngLat}) => addCreatureMarker(vaesen,lngLat));
}

function pickVaesner(type, features, count) {
  const candidates = VAESNER.filter(v => v.type===type);
  const result = [];
  for (let i=0; i<count && features.length; i++) {
    const feat = features[Math.floor(Math.random()*features.length)];
    const pt   = featPoint(feat);
    if (!pt) continue;
    const v = candidates[Math.floor(Math.random()*candidates.length)];
    result.push({ vaesen:v, lngLat:[pt[0]+rnd(.0008), pt[1]+rnd(.0008)] });
  }
  return result;
}

function featPoint(f) {
  const g = f.geometry;
  if (!g) return null;
  if (g.type==='Point') return g.coordinates;
  if (g.type==='LineString') return g.coordinates[Math.floor(g.coordinates.length/2)];
  const ring = g.type==='Polygon' ? g.coordinates[0]
             : g.type==='MultiPolygon' ? g.coordinates[0][0] : null;
  if (!ring) return null;
  return [ring.reduce((s,c)=>s+c[0],0)/ring.length, ring.reduce((s,c)=>s+c[1],0)/ring.length];
}

function rnd(mag) { return (Math.random()-.5)*2*mag; }

function addCreatureMarker(vaesen, lngLat) {
  const el = document.createElement('div');
  el.className = 'cm';
  el.style.setProperty('--cc', vaesen.farve);
  el.innerHTML = `<svg viewBox="0 0 44 52" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="22" cy="48" rx="11" ry="4" fill="black" opacity=".35"/>
    <circle cx="22" cy="22" r="20" fill="${vaesen.farve}" opacity=".25"/>
    <circle cx="22" cy="22" r="16" fill="${vaesen.farve}"/>
    <text x="22" y="28" text-anchor="middle" font-size="16" fill="white">${vaesen.emoji}</text>
  </svg>`;
  el.addEventListener('click', () => { activeVaesen = vaesen; showEncounterCard(vaesen); });

  const marker = new maplibregl.Marker({element:el, anchor:'bottom'})
    .setLngLat(lngLat)
    .addTo(map);

  spawned.push({ id:vaesen.id+'_'+Date.now(), vaesen, lngLat, marker });
}

// ═══════════════════════════════════════════════════════════════
// NÆRHED
// ═══════════════════════════════════════════════════════════════
function checkProximity() {
  if (!userPos || !spawned.length) return;
  const [ulng,ulat] = userPos;
  let closest = null, minDist = Infinity;
  spawned.forEach(s => {
    const d = haversine(ulat,ulng, s.lngLat[1], s.lngLat[0]);
    if (d < 150 && d < minDist) { minDist=d; closest=s; }
  });

  const banner = document.getElementById('nearby-banner');
  if (closest) {
    nearbyTarget = closest.vaesen;
    const v = closest.vaesen;
    banner.style.setProperty('--bc', v.farve);
    banner.style.setProperty('--bs', v.glow);
    document.getElementById('nb-icon').textContent = v.emoji;
    document.getElementById('nb-name').textContent = v.navn;
    document.getElementById('nb-dist').textContent = `${Math.round(minDist)} meter borte`;
    banner.classList.remove('hidden');
  } else {
    nearbyTarget = null;
    banner.classList.add('hidden');
  }
}

setInterval(() => { if (userPos) checkProximity(); }, 4000);

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371e3, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ═══════════════════════════════════════════════════════════════
// ENCOUNTER
// ═══════════════════════════════════════════════════════════════
function startEncounter() {
  if (!nearbyTarget) return;
  showEncounterCard(nearbyTarget);
}

function showEncounterCard(vaesen) {
  activeVaesen = vaesen;
  const card = document.getElementById('encounter-card');
  card.style.setProperty('--eg', vaesen.glow);
  card.style.setProperty('--en', vaesen.farve);
  document.getElementById('ec-art').innerHTML = SVG[vaesen.id] || '';
  document.getElementById('ec-name').textContent = vaesen.navn;
  document.getElementById('ec-name').style.color = vaesen.farve;
  document.getElementById('ec-lore').textContent = vaesen.lore;
  document.getElementById('ec-result').textContent = '';
  document.getElementById('flee-btn').style.display = '';
  document.getElementById('ec-instruction').textContent = `Tegn ${vaesen.sigil.navn} for at binde den!`;
  document.getElementById('encounter-overlay').classList.remove('hidden');
  document.getElementById('nearby-banner').classList.add('hidden');
  setTimeout(initSigil, 100);
}

function endEncounter(caught) {
  document.getElementById('encounter-overlay').classList.add('hidden');
  if (caught && activeVaesen) {
    const id = activeVaesen.id;
    if (!gs.caught[id]) gs.caught[id] = { vaesen:activeVaesen, count:0, first: new Date().toLocaleDateString('da-DK') };
    gs.caught[id].count++;
    saveState();
    // Fjern det fangede væsen fra kortet
    spawned = spawned.filter(s => {
      if (s.vaesen.id === id) { s.marker.remove(); return false; }
      return true;
    });
    showStatus(`${activeVaesen.navn} bundet til amulet!`, 3000);
  }
  activeVaesen = null;
}

// ═══════════════════════════════════════════════════════════════
// SIGIL
// ═══════════════════════════════════════════════════════════════
let sig = { canvas:null, ctx:null, pts:[], wp:0, drawing:false, path:[] };

function initSigil() {
  const canvas = document.getElementById('sigil-canvas');
  const wrap   = document.getElementById('sigil-wrap');
  const size   = wrap.offsetWidth;
  const dpr    = window.devicePixelRatio || 1;
  canvas.width  = size * dpr;
  canvas.height = size * 0.85 * dpr;
  canvas.style.height = (size * 0.85) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  sig = { canvas, ctx, pts: activeVaesen.sigil.pts, wp:0, drawing:false, path:[] };
  drawSigil();

  // Touch
  canvas.ontouchstart  = e => { e.preventDefault(); const t=e.touches[0]; const r=canvas.getBoundingClientRect(); onDown(t.clientX-r.left, t.clientY-r.top); };
  canvas.ontouchmove   = e => { e.preventDefault(); const t=e.touches[0]; const r=canvas.getBoundingClientRect(); onMove(t.clientX-r.left, t.clientY-r.top); };
  canvas.ontouchend    = e => { e.preventDefault(); onUp(); };
  // Mouse
  canvas.onmousedown   = e => { const r=canvas.getBoundingClientRect(); onDown(e.clientX-r.left,e.clientY-r.top); };
  canvas.onmousemove   = e => { if(!sig.drawing)return; const r=canvas.getBoundingClientRect(); onMove(e.clientX-r.left,e.clientY-r.top); };
  canvas.onmouseup     = onUp;
}

function drawSigil() {
  const { canvas:cv, ctx, pts, wp } = sig;
  const w = cv.width  / (window.devicePixelRatio||1);
  const h = cv.height / (window.devicePixelRatio||1);

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#06030f';
  ctx.fillRect(0,0,w,h);

  // Tegn sigilsti (dashed gylden)
  ctx.beginPath();
  ctx.setLineDash([7,6]);
  ctx.strokeStyle = 'rgba(201,162,39,.35)';
  ctx.lineWidth = 1.5;
  pts.forEach((p,i) => { i===0 ? ctx.moveTo(p[0]*w,p[1]*h) : ctx.lineTo(p[0]*w,p[1]*h); });
  ctx.stroke();
  ctx.setLineDash([]);

  // Brugerens tegning
  if (sig.path.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = '#ff9630';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = '#ff9630';
    ctx.shadowBlur = 7;
    sig.path.forEach((p,i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Waypoints
  pts.forEach((p,i) => {
    const px=p[0]*w, py=p[1]*h;
    const done = i < wp;
    const active = i === wp;
    const col = done ? '#ffc030' : active ? '#ff9030' : '#3a2a08';
    const glow = done ? 'rgba(255,192,48,.8)' : active ? 'rgba(255,144,48,.9)' : 'rgba(80,60,10,.3)';
    const gr = ctx.createRadialGradient(px,py,0,px,py,22);
    gr.addColorStop(0,glow); gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(px,py,22,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.arc(px,py,11,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=done?2.5:1.5; ctx.stroke();
    // Nummer (ikke sidste punkt hvis det er lig første)
    const isLast = i===pts.length-1 && Math.abs(p[0]-pts[0][0])<.01 && Math.abs(p[1]-pts[0][1])<.01;
    if (!isLast) {
      ctx.fillStyle=col; ctx.font=`bold 10px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1),px,py);
    }
  });
}

function onDown(x,y) { sig.drawing=true; sig.path=[[x,y]]; }
function onMove(x,y) {
  if (!sig.drawing) return;
  sig.path.push([x,y]);
  const cv=sig.canvas;
  const w=cv.width/(window.devicePixelRatio||1);
  const h=cv.height/(window.devicePixelRatio||1);
  const target=sig.pts[sig.wp];
  if (target) {
    const dist=Math.hypot(x-target[0]*w, y-target[1]*h);
    if (dist < w*0.13) {
      sig.wp++;
      if (sig.wp >= sig.pts.length) { sig.drawing=false; setTimeout(sigilDone,200); return; }
    }
  }
  drawSigil();
}
function onUp() { sig.drawing=false; }

function sigilDone() {
  // Succes-animation
  const card = document.getElementById('encounter-card');
  const res  = document.getElementById('ec-result');
  res.textContent = `✦ ${activeVaesen.navn} er bundet! ✦`;
  res.style.color = '#c9a227';
  card.style.animation = 'goldGlow .8s ease';
  document.getElementById('flee-btn').style.display = 'none';
  document.getElementById('ec-instruction').textContent = 'Amuletten er smedet!';
  setTimeout(() => {
    card.style.animation = '';
    endEncounter(true);
  }, 1800);
}

// ═══════════════════════════════════════════════════════════════
// BESTIARIUM
// ═══════════════════════════════════════════════════════════════
function openBestiary() {
  const total = Object.keys(gs.caught).length;
  document.getElementById('bp-count').textContent =
    `${total} af ${VAESNER.length} fundet · ${Object.values(gs.caught).reduce((s,c)=>s+c.count,0)} fanget`;

  const content = document.getElementById('bp-content');
  const empty   = document.getElementById('bp-empty');

  if (!total) { empty.classList.remove('hidden'); content.classList.add('hidden'); }
  else {
    empty.classList.add('hidden');
    content.classList.remove('hidden');
    content.innerHTML = '';

    // Grupper efter type
    const types = { building:'Huse', water:'Vand', forest:'Skov' };
    Object.entries(types).forEach(([type,label]) => {
      const inType = VAESNER.filter(v=>v.type===type);
      const section = document.createElement('div');
      section.className = 'bp-section';
      section.innerHTML = `<div class="bp-section-title">${label}</div><div class="bp-grid"></div>`;
      const grid = section.querySelector('.bp-grid');
      inType.forEach(v => {
        const caught = gs.caught[v.id];
        const div = document.createElement('div');
        div.className = 'bp-amulet' + (caught ? '' : ' locked');
        div.innerHTML = `
          <div class="bp-amulet-art"><canvas width="80" height="80"></canvas></div>
          <div class="bp-amulet-name">${v.navn}</div>
          <div class="bp-amulet-count">${caught ? `×${caught.count} · ${caught.first}` : 'Ikke fundet'}</div>`;
        // Tegn amulet
        const cv = div.querySelector('canvas');
        drawAmulet(cv, v, !!caught);
        grid.appendChild(div);
      });
      content.appendChild(section);
    });
  }

  document.getElementById('bestiary-panel').classList.remove('hidden');
}

function closeBestiary() {
  document.getElementById('bestiary-panel').classList.add('hidden');
}

function drawAmulet(canvas, vaesen, unlocked) {
  const ctx = canvas.getContext('2d');
  const s = 80;
  ctx.clearRect(0,0,s,s);

  // Baggrund
  const bg = ctx.createRadialGradient(40,40,5,40,40,38);
  bg.addColorStop(0, unlocked ? '#180a20' : '#0a0508');
  bg.addColorStop(1, '#030105');
  ctx.beginPath(); ctx.arc(40,40,38,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();

  // Sigilsti
  const col = unlocked ? vaesen.farve : '#2a1508';
  const pts = vaesen.sigil.pts;
  ctx.beginPath();
  ctx.strokeStyle = col;
  ctx.lineWidth = unlocked ? 1.5 : 1;
  ctx.globalAlpha = unlocked ? .8 : .3;
  pts.forEach((p,i) => {
    const x=12+p[0]*56, y=12+p[1]*56;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.globalAlpha=1;

  // Kant
  ctx.beginPath(); ctx.arc(40,40,38,0,Math.PI*2);
  ctx.strokeStyle = unlocked ? vaesen.farve : '#2a1508';
  ctx.lineWidth = unlocked ? 2 : 1;
  ctx.stroke();

  // Glow hvis fanget
  if (unlocked) {
    const gl = ctx.createRadialGradient(40,40,20,40,40,40);
    gl.addColorStop(0,'rgba(0,0,0,0)');
    gl.addColorStop(.7,vaesen.glow.replace('.5','.15'));
    gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(40,40,38,0,Math.PI*2);
    ctx.fillStyle=gl; ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════

function showStatus(msg,duration=3000) {
  const el=document.getElementById('status');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t);
  if (duration) el._t=setTimeout(()=>el.style.display='none',duration);
}

// Auto-start GPS hvis tidligere brugt
if (localStorage.getItem('sagnkortet_gps')==='1') startTracking();
document.getElementById('gps-btn').addEventListener('click', () => {
  localStorage.setItem('sagnkortet_gps','1');
});
